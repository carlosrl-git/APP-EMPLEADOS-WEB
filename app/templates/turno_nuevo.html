
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo turno</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            background: #080808;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            padding: 32px;
        }
        .card {
            max-width: 760px;
            margin: 0 auto;
            background: #111;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,.45);
        }
        h1 {
            margin-top: 0;
            color: #fff;
        }
        label {
            display: block;
            margin-top: 16px;
            margin-bottom: 6px;
            font-weight: 700;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #181818;
            color: #fff;
            box-sizing: border-box;
        }
        textarea {
            min-height: 90px;
            resize: vertical;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
        }
        .btn {
            border: 0;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 700;
        }
        .btn-primary {
            background: #e50914;
            color: #fff;
        }
        .btn-secondary {
            background: #252525;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Nuevo turno</h1>

        <form method="post" action="/turnos/nuevo">
            <label>Trabajador</label>
            <select name="trabajador_id" required>
                <option value="">Selecciona trabajador</option>
                {% for t in trabajadores %}
                <option value="{{ t.id }}">{{ t.nombre }} {{ t.apellidos or '' }}</option>
                {% endfor %}
            </select>

            <label>Zona</label>
            <select name="zona_id">
                <option value="">Sin zona</option>
                {% for z in zonas %}
                <option value="{{ z.id }}">{{ z.nombre }}</option>
                {% endfor %}
            </select>

            <div class="row">
                <div>
                    <label>Fecha</label>
                    <input type="date" name="fecha" required>
                </div>
                <div>
                    <label>Estado</label>
                    <select name="estado">
                        <option value="pendiente">Pendiente</option>
                        <option value="asignado">Asignado</option>
                        <option value="completado">Completado</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <div>
                    <label>Hora inicio</label>
                    <input type="time" name="inicio_jornada" required>
                </div>
                <div>
                    <label>Hora fin</label>
                    <input type="time" name="fin_jornada" required>
                </div>
            </div>

            <label>Observaciones</label>
            <textarea name="observaciones"></textarea>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar turno</button>
                <a class="btn btn-secondary" href="/turnos">Volver</a>
            </div>
        </form>
    </div>
</body>
</html>
