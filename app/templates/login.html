<!<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | App Empleados</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #070707;
            color: #fff;
        }

        body {
            position: relative;
        }

        .background {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 18% 20%, rgba(255, 20, 80, 0.20), transparent 30%),
                radial-gradient(circle at 82% 22%, rgba(255, 0, 70, 0.14), transparent 26%),
                radial-gradient(circle at 72% 80%, rgba(255, 40, 95, 0.16), transparent 28%),
                linear-gradient(135deg, #050505 0%, #0a0a0a 30%, #111111 68%, #070707 100%);
            animation: bgShift 16s ease-in-out infinite alternate;
        }

        .background::before {
            content: "";
            position: absolute;
            inset: -10%;
            background:
                linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.02) 45%, transparent 55%),
                linear-gradient(300deg, transparent 0%, rgba(255,40,95,0.06) 48%, transparent 55%);
            animation: bgFloat 18s linear infinite;
        }

        @keyframes bgShift {
            0% {
                transform: scale(1) translate(0, 0);
                filter: brightness(1);
            }
            100% {
                transform: scale(1.05) translate(-1.2%, 1%);
                filter: brightness(1.08);
            }
        }

        @keyframes bgFloat {
            0% {
                transform: translateX(-4%) translateY(-2%);
            }
            100% {
                transform: translateX(4%) translateY(2%);
            }
        }

        canvas#network {
            position: fixed;
            inset: 0;
            z-index: 1;
            opacity: 1;
        }

        .glow {
            position: fixed;
            width: 460px;
            height: 460px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,35,90,0.26) 0%, rgba(255,35,90,0.10) 30%, transparent 72%);
            filter: blur(42px);
            z-index: 0;
            animation: glowMove 12s ease-in-out infinite alternate;
            pointer-events: none;
        }

        .glow.one {
            top: -90px;
            left: -80px;
        }

        .glow.two {
            right: -110px;
            bottom: -100px;
            animation-delay: 2s;
        }

        @keyframes glowMove {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(28px, 20px) scale(1.10);
            }
        }

        .page-center {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            width: 100%;
            max-width: 430px;
            background: rgba(12, 12, 12, 0.84);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 34px 30px 26px 30px;
            backdrop-filter: blur(14px);
            box-shadow:
                0 20px 60px rgba(0,0,0,0.45),
                0 0 0 1px rgba(255,255,255,0.02) inset,
                0 0 48px rgba(255, 35, 90, 0.12);
            animation: cardIn 0.8s ease-out;
        }

        @keyframes cardIn {
            0% {
                opacity: 0;
                transform: translateY(24px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .brand {
            margin-bottom: 24px;
            text-align: center;
        }

        .brand h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: #ffffff;
            text-shadow: 0 0 22px rgba(255,35,90,0.34);
        }

        .brand p {
            margin: 10px 0 0 0;
            color: #a3a3a3;
            font-size: 14px;
        }

        .title {
            font-size: 21px;
            font-weight: 700;
            margin: 0 0 20px 0;
            text-align: center;
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 12px;
            background: rgba(255, 35, 90, 0.14);
            border: 1px solid rgba(255, 35, 90, 0.40);
            color: #ffd7df;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 14px;
        }

        .input-label {
            display: block;
            margin-bottom: 8px;
            color: #d0d0d0;
            font-size: 14px;
            font-weight: 600;
        }

        .input {
            width: 100%;
            height: 48px;
            border-radius: 14px;
            border: 1px solid #2b2b2b;
            background: rgba(255,255,255,0.03);
            color: #fff;
            padding: 0 14px;
            outline: none;
            transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
        }

        .input::placeholder {
            color: #7d7d7d;
        }

        .input:focus {
            border-color: #ff2b65;
            box-shadow: 0 0 0 3px rgba(255,43,101,0.16);
            background: rgba(255,255,255,0.05);
        }

        .btn {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 14px;
            margin-top: 6px;
            background: linear-gradient(135deg, #c1143f 0%, #e11d48 50%, #ff2f6d 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
            box-shadow: 0 12px 28px rgba(255,35,90,0.28);
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.08);
            box-shadow: 0 16px 34px rgba(255,35,90,0.34);
        }

        .btn:active {
            transform: translateY(0);
        }

        .link-wrap {
            margin-top: 18px;
            text-align: center;
        }

        .link {
            color: #d8d8d8;
            text-decoration: none;
            font-size: 14px;
            transition: color .2s ease;
        }

        .link:hover {
            color: #ffffff;
        }

        .footer-note {
            margin-top: 22px;
            text-align: center;
            font-size: 12px;
            color: #767676;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="glow one"></div>
    <div class="glow two"></div>
    <canvas id="network"></canvas>

    <div class="page-center">
        <div class="card">
            <div class="brand">
                <h1>App Empleados</h1>
                <p>Panel de gestión web</p>
            </div>

            <h2 class="title">Iniciar sesión</h2>

            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/login">
                <div class="input-group">
                    <label class="input-label">Usuario</label>
                    <input class="input" type="text" name="username" placeholder="Introduce tu usuario" required>
                </div>

                <div class="input-group">
                    <label class="input-label">Contraseña</label>
                    <input class="input" type="password" name="password" placeholder="Introduce tu contraseña" required>
                </div>

                <button class="btn" type="submit">Entrar</button>
            </form>

            <div class="link-wrap">
                <a class="link" href="/forgot-password">He olvidado mi contraseña</a>
            </div>

            <div class="footer-note">
                Acceso seguro al sistema interno
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("network");
        const ctx = canvas.getContext("2d");

        let width = 0;
        let height = 0;
        let particles = [];

        function resizeCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            createParticles();
        }

        function createParticles() {
            const count = Math.max(55, Math.floor((width * height) / 18000));
            particles = [];

            for (let i = 0; i < count; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 0.55,
                    vy: (Math.random() - 0.5) * 0.55,
                    r: Math.random() * 2.1 + 1.2
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < particles.length; i++) {
                const p = particles[i];

                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(255,255,255,0.72)";
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(255,255,255,0.18)";
                ctx.fill();
                ctx.shadowBlur = 0;

                for (let j = i + 1; j < particles.length; j++) {
                    const q = particles[j];
                    const dx = p.x - q.x;
                    const dy = p.y - q.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < 150) {
                        const alpha = (1 - dist / 150) * 0.34;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(q.x, q.y);
                        ctx.strokeStyle = `rgba(255, 35, 90, ${alpha})`;
                        ctx.lineWidth = 1.15;
                        ctx.stroke();
                    }
                }
            }

            requestAnimationFrame(drawParticles);
        }

        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();
        drawParticles();
    </script>
</body>
</html>
