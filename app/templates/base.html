<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>{% block title %}App Empleados{% endblock %}</title><link rel='stylesheet' href='{{ url_for("static", path="styles.css") }}'><style>html,body{margin:0;padding:0;background:#0b0b0b;color:#fff;font-family:Arial,sans-serif}.app-shell{display:flex;min-height:100vh;background:#0b0b0b;color:#fff}.sidebar{width:230px;background:#111;border-right:1px solid #242424;padding:22px 14px;box-sizing:border-box;position:fixed;left:0;top:0;bottom:0;overflow-y:auto}.brand{font-size:28px;font-weight:800;margin:0 0 8px 0}.brand-sub{color:#9ca3af;font-size:14px;margin:0 0 22px 0}.nav-group{margin:18px 0 10px 0;color:#6b7280;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em}.nav-link{display:block;padding:12px 14px;margin-bottom:8px;border-radius:12px;color:#fff;text-decoration:none;background:transparent;border:1px solid transparent}.nav-link:hover{background:#171717;border-color:#2b2b2b}.nav-link.active{background:#e11d48;border-color:#e11d48}.main-area{margin-left:230px;flex:1;min-height:100vh;padding:28px;box-sizing:border-box;width:calc(100% - 230px)}.content-card{background:#111;border:1px solid #242424;border-radius:22px;padding:26px;box-shadow:0 12px 40px rgba(0,0,0,.25);width:100%;max-width:none;box-sizing:border-box}.page-title{font-size:38px;font-weight:800;margin:0 0 8px 0}.page-subtitle{color:#b3b3b3;margin:0 0 24px 0}.top-actions{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;background:#e11d48;color:#fff;border:none;border-radius:12px;padding:12px 18px;font-weight:700;text-decoration:none;cursor:pointer}.btn:hover{filter:brightness(1.05)}.btn-inline{display:inline-flex;align-items:center;justify-content:center;background:#e11d48;color:#fff;border:1px solid #e11d48;border-radius:12px;padding:10px 14px;font-weight:700;text-decoration:none;cursor:pointer}.btn-inline.secondary{background:#161616;border:1px solid #2f2f2f;color:#fff}.btn-inline.secondary:hover{background:#1d1d1d}.input{width:100%;background:#0f0f0f;border:1px solid #2f2f2f;color:#fff;border-radius:12px;padding:12px 14px;box-sizing:border-box;outline:none}.input:focus{border-color:#e11d48;box-shadow:0 0 0 1px #e11d48 inset}.card{background:#111;border:1px solid #242424;border-radius:18px}.muted{color:#9ca3af}@media (max-width:980px){.sidebar{position:relative;width:100%;height:auto;border-right:0;border-bottom:1px solid #242424}.main-area{margin-left:0;width:100%;padding:18px}.app-shell{display:block}.content-card{padding:18px}}</style></head><body><div class='app-shell'><aside class='sidebar'><h1 class='brand'>App Empleados</h1><p class='brand-sub'>Panel de gestión web</p><div class='nav-group'>Principal</div><a class='nav-link {% if active_page == "inicio" %}active{% endif %}' href='/dashboard'>Inicio</a><div class='nav-group'>Personal</div><a class='nav-link {% if active_page == "trabajadores" %}active{% endif %}' href='/trabajadores'>Trabajadores</a>{% if rol == 'admin' %}<a class='nav-link {% if active_page == "usuarios" %}active{% endif %}' href='/usuarios'>Usuarios</a>{% endif %}<a class='nav-link {% if active_page == "departamentos" %}active{% endif %}' href='/departamentos'>Departamentos</a><div class='nav-group'>Operativa</div><a class='nav-link {% if active_page == "tareas" %}active{% endif %}' href='/tareas'>Tareas</a><a class='nav-link {% if active_page == "incidencias" %}active{% endif %}' href='/incidencias'>Incidencias</a><a class='nav-link {% if active_page == "turnos" %}active{% endif %}' href='/turnos'>Turnos</a><div class='nav-group'>Control horario</div><a class='nav-link {% if active_page == "horas" %}active{% endif %}' href='/horas'>Horas</a><a class='nav-link {% if active_page == "ausencias" %}active{% endif %}' href='/ausencias'>Ausencias</a><div class='nav-group'>Inventario</div><a class='nav-link {% if active_page == "productos" %}active{% endif %}' href='/productos'>Productos</a><a class='nav-link {% if active_page == "zonas" %}active{% endif %}' href='/zonas'>Zonas</a><div class='nav-group'>Sesión</div><a class='nav-link' href='/logout'>Cerrar sesión</a></aside><main class='main-area'><div class='content-card'>{% block content %}{% endblock %}</div></main></div></body></html>
