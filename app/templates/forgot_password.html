<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f1115;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #181c23;
            border: 1px solid #2b3240;
            border-radius: 14px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 26px;
            text-align: center;
        }

        p {
            margin: 0 0 20px 0;
            text-align: center;
            color: #b8c1d1;
            line-height: 1.5;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #3a4354;
            background: #10141b;
            color: #ffffff;
            box-sizing: border-box;
            margin-bottom: 16px;
            outline: none;
        }

        input[type="email"]:focus {
            border-color: #4da3ff;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #2d8cff;
            color: white;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s ease;
        }

        button:hover {
            background: #1f76df;
        }

        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            background: #12361f;
            color: #7CFC98;
            text-align: center;
        }

        .error {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            background: #3a1414;
            color: #ff8b8b;
            text-align: center;
        }

        .link {
            display: block;
            margin-top: 18px;
            text-align: center;
            color: #7db7ff;
            text-decoration: none;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Recuperar contraseña</h1>
        <p>Introduce tu correo electrónico y, si existe en el sistema, se enviará un código.</p>

        <form method="post" action="/forgot-password">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Enviar código</button>
        </form>

        {% if msg %}
            <div class="msg">{{ msg }}</div>
        {% endif %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <a class="link" href="/reset-password">Ya tengo un código</a>
        <a class="link" href="/login">Volver al inicio de sesión</a>
    </div>
</body>
</html>
