<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar contraseña</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="{{ url_for('static', path='logo.ico') }}">
    <style>
        :root{
            --bg:#050505;
            --card:#070707;
            --card-border:#1f1f1f;
            --text:#ffffff;
            --muted:#bdbdbd;
            --muted-2:#7a7a7a;
            --red:#ff1f5a;
            --red-dark:#c5003e;
            --input:#101010;
            --input-border:#262626;
        }

        *{
            box-sizing:border-box;
        }

        html,body{
            margin:0;
            padding:0;
            width:100%;
            min-height:100%;
            font-family:Arial, Helvetica, sans-serif;
            color:var(--text);
            background:
                radial-gradient(circle at 18% 18%, rgba(140,0,35,.55), transparent 26%),
                radial-gradient(circle at 82% 82%, rgba(140,0,35,.52), transparent 24%),
                radial-gradient(circle at 75% 20%, rgba(110,0,28,.26), transparent 18%),
                radial-gradient(circle at 20% 78%, rgba(110,0,28,.20), transparent 18%),
                #050505;
            overflow:hidden;
        }

        body{
            position:relative;
        }

        #network{
            position:fixed;
            inset:0;
            width:100%;
            height:100%;
            z-index:0;
            pointer-events:none;
        }

        .page{
            position:relative;
            z-index:1;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }

        .card{
            width:100%;
            max-width:390px;
            background:rgba(8,8,8,.94);
            border:1px solid var(--card-border);
            border-radius:22px;
            padding:36px 28px 24px;
            box-shadow:
                0 0 0 1px rgba(255,255,255,.02) inset,
                0 10px 30px rgba(0,0,0,.45),
                0 0 40px rgba(255,0,70,.08);
            backdrop-filter:blur(3px);
        }

        h1{
            margin:0 0 10px;
            text-align:center;
            font-size:2.05rem;
            font-weight:800;
            letter-spacing:-.02em;
            text-shadow:0 0 12px rgba(255,255,255,.08);
        }

        .subtitle{
            margin:0 0 28px;
            text-align:center;
            color:var(--muted);
            font-size:1rem;
            line-height:1.55;
        }

        .alert{
            margin-bottom:16px;
            padding:12px 14px;
            border-radius:12px;
            font-size:.95rem;
            line-height:1.45;
        }

        .alert.ok{
            background:rgba(16,90,40,.22);
            border:1px solid rgba(90,200,120,.26);
            color:#ddffe6;
        }

        .alert.error{
            background:rgba(120,0,20,.20);
            border:1px solid rgba(255,60,90,.25);
            color:#ffe0e8;
        }

        form{
            display:flex;
            flex-direction:column;
            gap:14px;
        }

        label{
            display:block;
            margin-bottom:8px;
            color:#f2f2f2;
            font-weight:700;
            font-size:.98rem;
        }

        .input{
            width:100%;
            height:44px;
            border-radius:14px;
            border:1px solid var(--input-border);
            background:rgba(16,16,16,.92);
            color:#fff;
            padding:0 14px;
            font-size:.98rem;
            outline:none;
            transition:.2s ease;
        }

        .input::placeholder{
            color:#7b7b7b;
        }

        .input:focus{
            border-color:#3a3a3a;
            box-shadow:0 0 0 2px rgba(255,31,90,.08);
        }

        .btn{
            margin-top:4px;
            width:100%;
            height:46px;
            border:none;
            border-radius:14px;
            cursor:pointer;
            color:#fff;
            font-size:1.02rem;
            font-weight:800;
            background:linear-gradient(180deg, #ff2663 0%, #ff1658 100%);
            box-shadow:
                0 10px 24px rgba(255,20,90,.26),
                0 0 18px rgba(255,20,90,.18);
            transition:.2s ease;
        }

        .btn:hover{
            transform:translateY(-1px);
            filter:brightness(1.03);
        }

        .links{
            margin-top:16px;
            display:flex;
            flex-direction:column;
            align-items:center;
            gap:12px;
        }

        .links a{
            color:#f0f0f0;
            text-decoration:none;
            font-size:.98rem;
        }

        .links a:hover{
            color:#ffffff;
            text-decoration:underline;
        }

        .footer-note{
            margin-top:18px;
            text-align:center;
            color:var(--muted-2);
            font-size:.88rem;
        }

        @media (max-width: 480px){
            .card{
                padding:30px 20px 22px;
                border-radius:20px;
            }

            h1{
                font-size:1.8rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="network"></canvas>

    <div class="page">
        <div class="card">
            <h1>Recuperar contraseña</h1>
            <p class="subtitle">Introduce tu correo electrónico y, si existe en el sistema, se enviará un código.</p>

            {% if msg %}
                <div class="alert ok">{{ msg }}</div>
            {% endif %}

            {% if error %}
                <div class="alert error">{{ error }}</div>
            {% endif %}

            <form method="post" action="/forgot-password" autocomplete="off">
                <div>
                    <label for="email">Correo electrónico</label>
                    <input
                        class="input"
                        id="email"
                        name="email"
                        type="email"
                        placeholder="Introduce tu correo"
                        required
                        maxlength="254"
                        autocomplete="off"
                    >
                </div>

                <button class="btn" type="submit">Enviar código</button>
            </form>

            <div class="links">
                <a href="/reset-password">Ya tengo un código</a>
                <a href="/">Volver al inicio de sesión</a>
            </div>

            <div class="footer-note">Acceso seguro al sistema interno</div>
        </div>
    </div>

    <script>
        (() => {
            const canvas = document.getElementById("network");
            const ctx = canvas.getContext("2d");
            let w = 0;
            let h = 0;
            let points = [];

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;

                const count = Math.max(26, Math.min(48, Math.floor((w * h) / 28000)));
                points = Array.from({ length: count }, () => ({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    vx: (Math.random() - 0.5) * 0.18,
                    vy: (Math.random() - 0.5) * 0.18,
                    r: Math.random() * 2 + 1.2
                }));
            }

            function step() {
                ctx.clearRect(0, 0, w, h);

                for (const p of points) {
                    p.x += p.vx;
                    p.y += p.vy;

                    if (p.x <= 0 || p.x >= w) p.vx *= -1;
                    if (p.y <= 0 || p.y >= h) p.vy *= -1;
                }

                for (let i = 0; i < points.length; i++) {
                    for (let j = i + 1; j < points.length; j++) {
                        const a = points[i];
                        const b = points[j];
                        const dx = a.x - b.x;
                        const dy = a.y - b.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);

                        if (dist < 120) {
                            const alpha = 1 - dist / 120;
                            ctx.beginPath();
                            ctx.moveTo(a.x, a.y);
                            ctx.lineTo(b.x, b.y);
                            ctx.strokeStyle = `rgba(120, 20, 45, ${alpha * 0.32})`;
                            ctx.lineWidth = 1;
                            ctx.stroke();
                        }
                    }
                }

                for (const p of points) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = "rgba(245,245,245,.95)";
                    ctx.fill();
                }

                requestAnimationFrame(step);
            }

            resize();
            step();
            window.addEventListener("resize", resize);
        })();
    </script>
</body>
</html>
