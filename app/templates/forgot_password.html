<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recuperar contraseña</title>
<link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
<div class="page-center">
<div class="card">
<h1 class="title">Recuperar contraseña</h1>
<p class="subtitle">Introduce tu correo para recibir un código de recuperación.</p>
<form method="post" action="/forgot-password">
<input class="input" type="email" name="email" placeholder="Correo electrónico" required>
<button class="btn" type="submit">Enviar código</button>
</form>
{% if msg %}<p class="msg">{{ msg }}</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<a class="link" href="/reset-password">Ya tengo un código</a><br>
<a class="link" href="/">Volver al login</a>
</div>
</div>
</body>
</html>
