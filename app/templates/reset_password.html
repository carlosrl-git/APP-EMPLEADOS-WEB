<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer contraseña</title>
<link rel="stylesheet" href="{{ url_for('static', path='styles.css') }}">
</head>
<body>
<div class="page-center">
<div class="card">
<h1 class="title">Restablecer contraseña</h1>
<p class="subtitle">Introduce tu correo, el código recibido y la nueva contraseña.</p>
<form method="post" action="/reset-password">
<input class="input" type="email" name="email" placeholder="Correo electrónico" required>
<input class="input" type="text" name="code" placeholder="Código de recuperación" required>
<input class="input" type="password" name="new_password" placeholder="Nueva contraseña" required>
<button class="btn" type="submit">Cambiar contraseña</button>
</form>
{% if msg %}<p class="msg">{{ msg }}</p>{% endif %}
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<a class="link" href="/forgot-password">Solicitar otro código</a><br>
<a class="link" href="/">Volver al login</a>
</div>
</div>
</body>
</html>
